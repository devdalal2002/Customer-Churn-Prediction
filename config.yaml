defaults:
  raw: data/raw/Telco-Customer-Churn.csv
  interim: data/interim/telco_interim.csv
  processed: data/processed/telco_clean.csv

models:
  baseline: models/baseline_model.pkl
  tuned: models/tuned_model.pkl
  preprocessor: models/scaler_encoder.pkl
  pipeline: models/pipeline.pkl

training:
  random_state: 42
  test_size: 0.2
  cv_folds: 5
  min_rows: 200
  min_class_count: 10
  cv_lr: 5
  cv_rf: 3

# Dashboard / app display settings
id_column: customerID
display_columns:
  - tenure
  - MonthlyCharges
  - Contract

# Schema and preprocessing settings
target_column: Churn
features:
  numeric: []
  categorical: []
imputation:
  default_numeric: median
  default_categorical: mode
  column_imputations:
    TotalCharges: telco_total_charges

# Auto-run settings
auto_run_on_upload: true
auto_train_on_upload: true
# If true, uploads will trigger training and overwrite the existing pipeline by default
train_on_upload_overwrite: true
prediction_threshold: 0.5
